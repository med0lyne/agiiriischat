<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AGIIRISCHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00ff88; --gd: #00ff8840; --gg: #00ff8815;
  --r: #ff3b3b; --y: #ffd700; --b: #4488ff;
  --bg: #080a08; --panel: #0d0f0d; --card: #111411;
  --border: #182018; --text: #c8e6c8; --muted: #3a5a3a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column}

/* scanlines */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:.18em;color:var(--g);text-shadow:0 0 18px var(--g),0 0 36px var(--gd)}
.hstatus{display:flex;align-items:center;gap:10px;font-size:.65rem;color:var(--muted);letter-spacing:.1em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--g);animation:pulse 2s infinite}
.dot.off{background:var(--r);box-shadow:0 0 6px var(--r);animation:none}
.dot.spin{background:var(--y);box-shadow:0 0 6px var(--y);animation:pulse .4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.tab{flex:1;padding:10px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.15em;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;position:relative}
.tab.active{color:var(--g);border-bottom-color:var(--g)}
.tab:hover:not(.active){color:var(--text)}
.tab-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--r);color:#fff;font-size:.5rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.tab-badge.show{display:flex}

/* ── PANELS ── */
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.active{display:flex}

/* ── CHAT PANEL ── */
.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.chat-area::-webkit-scrollbar{width:2px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border)}

.msg{display:flex;gap:8px;align-items:flex-start;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.sys{justify-content:center;color:var(--muted);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:3px 0}
.msg.sys::before,.msg.sys::after{content:'─';color:var(--border);margin:0 6px}
.av{width:22px;height:22px;border-radius:3px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.7rem;color:var(--g);flex-shrink:0;margin-top:2px}
.mb{flex:1}
.mh{display:flex;align-items:baseline;gap:8px;margin-bottom:1px}
.mn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;color:var(--g);letter-spacing:.06em}
.mt{font-size:.58rem;color:var(--muted)}
.mx{font-size:.76rem;color:var(--text);line-height:1.5;word-break:break-word}
.vn{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--g);letter-spacing:.06em}

/* ── BOTTOM CONTROLS ── */
.controls{border-top:1px solid var(--border);background:var(--panel);padding:12px 14px;flex-shrink:0;display:flex;flex-direction:column;gap:9px}
.ptt-row{display:flex;align-items:center;gap:10px}
.ptt-btn{width:58px;height:58px;border-radius:50%;border:2px solid var(--muted);background:var(--bg);color:var(--muted);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;transition:all .1s}
.ptt-btn:hover:not(:disabled){border-color:var(--g);color:var(--g);box-shadow:0 0 14px var(--gd)}
.ptt-btn.active{border-color:var(--r);color:var(--r);background:rgba(255,59,59,.08);animation:pttP .6s ease infinite alternate}
.ptt-btn:disabled{opacity:.25;cursor:not-allowed}
@keyframes pttP{from{box-shadow:0 0 12px rgba(255,59,59,.3)}to{box-shadow:0 0 28px rgba(255,59,59,.7)}}
.ptt-info{flex:1}
.ptt-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.88rem;letter-spacing:.14em;color:var(--text)}
.ptt-sub{font-size:.58rem;color:var(--muted);letter-spacing:.09em}
.ptt-sub.tx{color:var(--r);animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.meter{display:flex;gap:2px;align-items:flex-end;height:18px}
.mb2{width:4px;border-radius:1px;background:var(--border);transition:height .05s,background .05s}
.mb2.on{background:var(--g)}
.mb2.on.hi{background:var(--r)}

.input-row{display:flex;gap:7px}
.ci{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.75rem;padding:8px 10px;border-radius:3px;outline:none;letter-spacing:.03em}
.ci:focus{border-color:var(--g);box-shadow:0 0 7px var(--gg)}
.ci::placeholder{color:var(--muted)}
.ci:disabled{opacity:.3;cursor:not-allowed}
.sbtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:8px 11px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.08em}
.sbtn:hover:not(:disabled){border-color:var(--g);color:var(--g);box-shadow:0 0 7px var(--gd)}
.sbtn:disabled{opacity:.3;cursor:not-allowed}
.duck{font-size:.58rem;color:var(--muted);text-align:center;letter-spacing:.07em}
.duck.on{color:var(--y)}

/* ── MEMBERS PANEL ── */
.members-panel{flex:1;overflow-y:auto;padding:10px}
.member{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:4px;margin-bottom:2px;border-left:2px solid transparent;transition:background .15s}
.member.sp{background:var(--gg);border-left-color:var(--g)}
.mav{width:34px;height:34px;border-radius:4px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;color:var(--g);flex-shrink:0;border:1px solid var(--border)}
.member.sp .mav{border-color:var(--g);box-shadow:0 0 7px var(--gd)}
.minfo{flex:1;min-width:0}
.mname{font-size:.78rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mstatus{font-size:.6rem;color:var(--muted)}
.member.sp .mstatus{color:var(--g)}
.wv{display:none;gap:2px;align-items:flex-end}
.member.sp .wv{display:flex}
.wb{width:3px;background:var(--g);border-radius:1px;animation:wv .5s ease-in-out infinite alternate}
.wb:nth-child(1){height:5px;animation-delay:0s}
.wb:nth-child(2){height:9px;animation-delay:.15s}
.wb:nth-child(3){height:6px;animation-delay:.3s}
@keyframes wv{from{transform:scaleY(.3)}to{transform:scaleY(1)}}

/* join form at bottom of members panel */
.join-form{padding:12px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0}
.fl{font-size:.58rem;color:var(--muted);letter-spacing:.12em;margin-bottom:3px;margin-top:6px}
.fl:first-child{margin-top:0}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:.73rem;padding:7px 9px;border-radius:3px;outline:none;letter-spacing:.04em;color:var(--text);margin-bottom:0}
.fi.green{color:var(--g)}
.fi.yellow{color:var(--y);text-transform:uppercase}
.fi.blue{color:var(--b);font-size:.67rem}
.fi:focus{border-color:var(--g)}
.fi::placeholder{color:var(--muted)}
.jbtn{width:100%;background:var(--g);color:var(--bg);border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:.2em;padding:9px;border-radius:3px;cursor:pointer;transition:all .15s;margin-top:8px}
.jbtn:hover{background:#00ffaa;box-shadow:0 0 14px var(--g)}
.jbtn.lv{background:transparent;color:var(--r);border:1px solid var(--r)}
.jbtn.lv:hover{background:rgba(255,59,59,.1)}
.jbtn:disabled{opacity:.4;cursor:not-allowed}

/* ── PHOTOS PANEL ── */
.photos-panel{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.photos-panel::-webkit-scrollbar{width:2px}
.photos-panel::-webkit-scrollbar-thumb{background:var(--border)}
.photo-card{background:var(--card);border:1px solid var(--border);border-radius:5px;overflow:hidden;animation:fadeUp .2s ease}
.photo-header{display:flex;align-items:center;gap:8px;padding:8px 10px}
.photo-av{width:22px;height:22px;border-radius:3px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.7rem;color:var(--g);flex-shrink:0}
.photo-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;color:var(--g);letter-spacing:.06em;flex:1}
.photo-time{font-size:.58rem;color:var(--muted)}
.photo-img{width:100%;display:block;max-height:320px;object-fit:cover;cursor:pointer}
.photo-upload{display:flex;align-items:center;gap:8px;padding:10px}
.upload-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.12em;padding:8px 14px;border-radius:3px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.upload-btn:hover:not(:disabled){border-color:var(--g);color:var(--g)}
.upload-btn:disabled{opacity:.3;cursor:not-allowed}
#photoFile{display:none}
.photos-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);font-size:.72rem;letter-spacing:.1em;gap:8px}
.photos-empty .big{font-size:2.2rem;margin-bottom:4px}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:4px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1.2rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── MAP PANEL ── */
.map-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#map{flex:1;background:var(--bg)}
.map-bar{padding:8px 12px;border-top:1px solid var(--border);background:var(--panel);font-size:.6rem;color:var(--muted);letter-spacing:.09em;display:flex;align-items:center;gap:8px;flex-shrink:0}
.loc-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.12em;padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .15s}
.loc-btn:hover{border-color:var(--g);color:var(--g)}
.loc-btn.on{border-color:var(--g);color:var(--g);background:var(--gg)}
.map-notice{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:.72rem;letter-spacing:.1em;pointer-events:none}
.map-notice .big{font-size:2.5rem}

/* scrollbar */
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
</style>
</head>
<body>

<header>
  <div class="logo">AGIIRISCHAT</div>
  <div class="hstatus">
    <div class="dot off" id="cDot"></div>
    <span id="cLabel">DESCONECTADO</span>
    <span id="rLabel" style="color:var(--y);display:none"></span>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('chat')" id="tab-chat">💬 CHAT</button>
  <button class="tab" onclick="switchTab('members')" id="tab-members">👥 GRUPO</button>
  <button class="tab" onclick="switchTab('photos')" id="tab-photos">📸 FOTOS<span class="tab-badge" id="badge-photos">0</span></button>
  <button class="tab" onclick="switchTab('map')" id="tab-map">📍 MAPA</button>
</div>

<!-- ── CHAT PANEL ── -->
<div class="panel active" id="panel-chat">
  <div class="chat-area" id="chatArea">
    <div class="msg sys">AGIIRISCHAT — READY</div>
  </div>
  <div class="controls">
    <div class="ptt-row">
      <button class="ptt-btn" id="pttBtn" disabled>🎙️</button>
      <div class="ptt-info">
        <div class="ptt-label">PUSH TO TALK</div>
        <div class="ptt-sub" id="pttSub">MANTÉN PULSADO · SPACEBAR</div>
      </div>
      <div class="meter" id="meter">
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
        <div class="mb2" style="height:4px"></div>
      </div>
    </div>
    <div class="input-row">
      <input class="ci" id="chatInput" placeholder="ESCRIBE UN MENSAJE..." disabled
        onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="sbtn" id="sendBtn" disabled onclick="sendMsg()">ENVIAR</button>
    </div>
    <div class="duck" id="duck">🎵 AUDIO DUCKING — SPOTIFY SIGUE SONANDO</div>
  </div>
</div>

<!-- ── MEMBERS PANEL ── -->
<div class="panel" id="panel-members" style="flex-direction:column">
  <div class="members-panel" id="membersList">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:var(--muted);font-size:.72rem;letter-spacing:.1em">
      <div style="font-size:2rem;margin-bottom:4px">📡</div><span>ÚNETE A UNA SALA</span>
    </div>
  </div>
  <div class="join-form">
    <div class="fl">NOMBRE</div>
    <input class="fi green" id="nameInput" placeholder="TU NOMBRE..." maxlength="16">
    <div class="fl">SALA</div>
    <input class="fi yellow" id="roomInput" placeholder="SQUAD1" maxlength="12">
    <div class="fl">SERVIDOR WEBSOCKET</div>
    <input class="fi blue" id="serverInput" placeholder="ws://localhost:3000" value="ws://localhost:3000">
    <button class="jbtn" id="joinBtn" onclick="toggleJoin()">CONECTAR</button>
  </div>
</div>

<!-- ── PHOTOS PANEL ── -->
<div class="panel" id="panel-photos" style="flex-direction:column">
  <div style="padding:10px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:8px;flex-shrink:0">
    <button class="upload-btn" id="uploadBtn" disabled onclick="document.getElementById('photoFile').click()">
      <span>📷</span> SUBIR FOTO
    </button>
    <span style="font-size:.6rem;color:var(--muted);letter-spacing:.08em">COMPARTE CON TU SQUAD</span>
  </div>
  <input type="file" id="photoFile" accept="image/*" onchange="handlePhotoUpload(event)">
  <div class="photos-panel" id="photosArea">
    <div class="photos-empty" id="photosEmpty">
      <div class="big">📸</div>
      <span>SIN FOTOS AÚN</span>
      <span style="font-size:.6rem">CONECTA Y SUBE LA PRIMERA</span>
    </div>
  </div>
</div>

<!-- ── MAP PANEL ── -->
<div class="panel" id="panel-map">
  <div class="map-panel">
    <div id="map"></div>
    <div class="map-notice" id="mapNotice">
      <div class="big">🗺️</div>
      <span>CONÉCTATE PARA VER EL MAPA</span>
    </div>
  </div>
  <div class="map-bar">
    <button class="loc-btn" id="locBtn" onclick="toggleLocation()" disabled>📍 COMPARTIR MI POSICIÓN</button>
    <span id="locStatus" style="flex:1">UBICACIÓN DESACTIVADA</span>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Leaflet for map -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let myName='', roomId='', myId=Math.random().toString(36).slice(2,9);
let ws=null, connected=false, isTalking=false;
let localStream=null, audioCtx=null, analyserNode=null;
let peerConnections={}, remoteGains={};
let members={};
let levelRaf=null;
let map=null, myMarker=null, peerMarkers={};
let locationInterval=null, locationActive=false;
let photoBadge=0;
let activeTab='chat';

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  activeTab = tab;
  if (tab==='photos') { photoBadge=0; document.getElementById('badge-photos').classList.remove('show'); }
  if (tab==='map') initMap();
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);

function setConnected(val, connecting=false) {
  connected=val;
  $('cDot').className='dot'+(connecting?' spin':val?'':' off');
  $('cLabel').textContent=connecting?'CONECTANDO...':val?'EN LÍNEA':'DESCONECTADO';
  $('rLabel').style.display=val?'':'none';
  $('pttBtn').disabled=!val;
  $('chatInput').disabled=!val;
  $('sendBtn').disabled=!val;
  $('uploadBtn').disabled=!val;
  $('locBtn').disabled=!val;
  $('joinBtn').textContent=val?'DESCONECTAR':connecting?'...':'CONECTAR';
  $('joinBtn').className=val?'jbtn lv':'jbtn';
  $('joinBtn').disabled=connecting;
  ['nameInput','roomInput','serverInput'].forEach(id=>$(id).disabled=val||connecting);
}

function renderMembers() {
  const list=$('membersList'), ids=Object.keys(members);
  if (!ids.length) {
    list.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:var(--muted);font-size:.72rem;letter-spacing:.1em"><span>SALA VACÍA</span></div>';
    return;
  }
  list.innerHTML=ids.map(id=>{
    const m=members[id], ini=m.name.slice(0,2).toUpperCase(), isSelf=id===myId;
    return `<div class="member${m.speaking?' sp':''}">
      <div class="mav">${ini}</div>
      <div class="minfo">
        <div class="mname">${m.name}${isSelf?' (TÚ)':''}</div>
        <div class="mstatus">${m.speaking?'🎙 HABLANDO':'EN ESPERA'}</div>
      </div>
      <div class="wv"><div class="wb"></div><div class="wb"></div><div class="wb"></div></div>
    </div>`;
  }).join('');
}

function addMsg(name, text, type='text') {
  const area=$('chatArea'), now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  const ini=name.slice(0,2).toUpperCase(), div=document.createElement('div');
  if (type==='sys') { div.className='msg sys'; div.textContent=text; }
  else if (type==='voice') {
    div.className='msg';
    div.innerHTML=`<div class="av">${ini}</div><div class="mb"><div class="mh"><span class="mn">${name}</span><span class="mt">${now}</span></div><div class="vn">🎙 TRANSMISIÓN DE VOZ</div></div>`;
  } else {
    div.className='msg';
    div.innerHTML=`<div class="av">${ini}</div><div class="mb"><div class="mh"><span class="mn">${name}</span><span class="mt">${now}</span></div><div class="mx">${esc(text)}</div></div>`;
  }
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── Photo feed ───────────────────────────────────────────────────────────────
function addPhoto(name, dataUrl, fromSelf=false) {
  const area=$('photosArea');
  $('photosEmpty').style.display='none';
  const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  const ini=name.slice(0,2).toUpperCase();
  const card=document.createElement('div');
  card.className='photo-card';
  card.innerHTML=`
    <div class="photo-header">
      <div class="photo-av">${ini}</div>
      <span class="photo-name">${name}${fromSelf?' (TÚ)':''}</span>
      <span class="photo-time">${now}</span>
    </div>
    <img class="photo-img" src="${dataUrl}" onclick="openLightbox('${dataUrl.replace(/'/g,"\\'")}')">
  `;
  area.appendChild(card);
  area.scrollTop=area.scrollHeight;

  if (!fromSelf && activeTab!=='photos') {
    photoBadge++;
    const badge=$('badge-photos');
    badge.textContent=photoBadge>9?'9+':photoBadge;
    badge.classList.add('show');
  }
}

function handlePhotoUpload(e) {
  const file=e.target.files[0]; if (!file||!connected) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const data=ev.target.result;
    addPhoto(myName, data, true);
    // Send as base64 — strip data: prefix for efficiency, re-add on receive
    send({type:'photo', data:data, mime:file.type});
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function openLightbox(src) {
  $('lightboxImg').src=src;
  $('lightbox').classList.add('open');
}
function closeLightbox() { $('lightbox').classList.remove('open'); }

// ─── Live location ────────────────────────────────────────────────────────────
function initMap() {
  if (map) return;
  const notice=$('mapNotice');
  map=L.map('map',{zoomControl:true}).setView([40.4168,-3.7038],5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'©OpenStreetMap ©Carto', maxZoom:19
  }).addTo(map);
  if (connected) notice.style.display='none';
}

function makeMarkerIcon(name, color='#00ff88') {
  const ini=name.slice(0,2).toUpperCase();
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="42" viewBox="0 0 36 42">
    <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 24 18 24S36 31.5 36 18C36 8.06 27.94 0 18 0z" fill="${color}" opacity=".9"/>
    <circle cx="18" cy="18" r="10" fill="#080a08"/>
    <text x="18" y="22" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="9" fill="${color}">${ini}</text>
  </svg>`;
  return L.divIcon({ className:'', html:svg, iconSize:[36,42], iconAnchor:[18,42], popupAnchor:[0,-42] });
}

function toggleLocation() {
  if (!connected) return;
  if (locationActive) {
    locationActive=false;
    clearInterval(locationInterval);
    locationInterval=null;
    if (myMarker) { map.removeLayer(myMarker); myMarker=null; }
    $('locBtn').classList.remove('on');
    $('locStatus').textContent='UBICACIÓN DESACTIVADA';
    send({type:'location', lat:null, lng:null}); // signal off
  } else {
    locationActive=true;
    $('locBtn').classList.add('on');
    $('locStatus').textContent='BUSCANDO GPS...';
    sendLocation();
    locationInterval=setInterval(sendLocation, 5000);
  }
}

function sendLocation() {
  if (!navigator.geolocation) { $('locStatus').textContent='GPS NO DISPONIBLE'; return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat, longitude:lng}=pos.coords;
    if (!map) initMap();
    $('mapNotice').style.display='none';
    const icon=makeMarkerIcon(myName,'#ffd700');
    if (!myMarker) {
      myMarker=L.marker([lat,lng],{icon}).addTo(map).bindPopup(`${myName} (TÚ)`);
      map.setView([lat,lng],14);
    } else {
      myMarker.setLatLng([lat,lng]);
    }
    $('locStatus').textContent=`📍 COMPARTIENDO · ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    send({type:'location', lat, lng});
  }, err=>{
    $('locStatus').textContent='ERROR GPS: '+err.message;
  });
}

function updatePeerLocation(id, name, lat, lng) {
  if (lat===null) {
    if (peerMarkers[id]) { map.removeLayer(peerMarkers[id]); delete peerMarkers[id]; }
    return;
  }
  if (!map) initMap();
  $('mapNotice').style.display='none';
  const icon=makeMarkerIcon(name,'#00ff88');
  if (!peerMarkers[id]) {
    peerMarkers[id]=L.marker([lat,lng],{icon}).addTo(map).bindPopup(name);
  } else {
    peerMarkers[id].setLatLng([lat,lng]);
  }
}

// ─── Audio ────────────────────────────────────────────────────────────────────
async function initAudio() {
  if (localStream) return true;
  try {
    localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:false});
    audioCtx=new AudioContext();
    const src=audioCtx.createMediaStreamSource(localStream);
    analyserNode=audioCtx.createAnalyser(); analyserNode.fftSize=256;
    src.connect(analyserNode);
    localStream.getAudioTracks().forEach(t=>t.enabled=false);
    return true;
  } catch(e){ addMsg('SISTEMA','MIC: '+e.message,'sys'); return false; }
}

function startMeter() {
  if (!analyserNode) return;
  const bars=$('meter').children, data=new Uint8Array(analyserNode.frequencyBinCount);
  function tick(){
    analyserNode.getByteFrequencyData(data);
    const n=data.slice(0,32).reduce((a,b)=>a+b,0)/32/255;
    for(let i=0;i<bars.length;i++){
      const on=n>i/bars.length;
      bars[i].style.height=(on?4+n*16:4)+'px';
      bars[i].className='mb2'+(on?(n>.7?' on hi':' on'):'');
    }
    levelRaf=requestAnimationFrame(tick);
  }
  tick();
}
function stopMeter(){
  if(levelRaf)cancelAnimationFrame(levelRaf);
  const bars=$('meter').children;
  for(let b of bars){b.style.height='4px';b.className='mb2';}
}
function setDuck(duck){
  if(!audioCtx)return;
  Object.values(remoteGains).forEach(g=>g.gain.linearRampToValueAtTime(duck?.25:1,audioCtx.currentTime+.15));
  $('duck').className='duck'+(duck?' on':'');
  $('duck').textContent=duck?'🎵 DUCKING ON — SPOTIFY AL 25%':'🎵 AUDIO DUCKING — SPOTIFY SIGUE SONANDO';
}

// ─── PTT ──────────────────────────────────────────────────────────────────────
async function startTalk(){
  if(!connected||isTalking)return;
  const ok=await initAudio(); if(!ok)return;
  localStream.getAudioTracks().forEach(t=>t.enabled=true);
  isTalking=true;
  $('pttBtn').classList.add('active');
  $('pttSub').textContent='● TRANSMITIENDO...';
  $('pttSub').className='ptt-sub tx';
  startMeter(); setDuck(true);
  send({type:'speaking',speaking:true});
  if(members[myId]){members[myId].speaking=true;renderMembers();}
}
function stopTalk(){
  if(!isTalking)return;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=false);
  isTalking=false;
  $('pttBtn').classList.remove('active');
  $('pttSub').textContent='MANTÉN PULSADO · SPACEBAR';
  $('pttSub').className='ptt-sub';
  stopMeter(); setDuck(false);
  send({type:'speaking',speaking:false});
  if(members[myId]){members[myId].speaking=false;renderMembers();}
  addMsg(myName,'','voice');
}

const pttBtn=$('pttBtn');
pttBtn.addEventListener('mousedown',e=>{e.preventDefault();startTalk();});
pttBtn.addEventListener('mouseup',stopTalk);
pttBtn.addEventListener('mouseleave',stopTalk);
pttBtn.addEventListener('touchstart',e=>{e.preventDefault();startTalk();},{passive:false});
pttBtn.addEventListener('touchend',stopTalk);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.repeat&&!['chatInput','nameInput','roomInput','serverInput'].includes(document.activeElement?.id)){
    e.preventDefault();startTalk();
  }
});
document.addEventListener('keyup',e=>{if(e.code==='Space')stopTalk();});

// ─── WebSocket ────────────────────────────────────────────────────────────────
function send(msg){if(ws&&ws.readyState===1)ws.send(JSON.stringify(msg));}

async function onMsg(data){
  switch(data.type){
    case 'room_members':
      for(const m of data.members){
        members[m.id]={name:m.name,speaking:false};
        await initAudio(); await createOffer(m.id);
      }
      renderMembers(); break;
    case 'peer_joined':
      members[data.id]={name:data.name,speaking:false};
      renderMembers(); addMsg('SISTEMA',`${data.name} SE CONECTÓ`,'sys'); break;
    case 'peer_left':
      if(members[data.id]){addMsg('SISTEMA',`${members[data.id].name} SE DESCONECTÓ`,'sys');delete members[data.id];renderMembers();}
      closePeer(data.id);
      if(peerMarkers[data.id]){map?.removeLayer(peerMarkers[data.id]);delete peerMarkers[data.id];}
      break;
    case 'chat': addMsg(data.name,data.text); break;
    case 'speaking': if(members[data.id]){members[data.id].speaking=data.speaking;renderMembers();} break;
    case 'photo': addPhoto(data.name, data.data); break;
    case 'location':
      if(map||data.lat!==null){
        if(!map)initMap();
        updatePeerLocation(data.id,data.name,data.lat,data.lng);
      }
      break;
    case 'offer': await initAudio(); await handleOffer(data); break;
    case 'answer': await handleAnswer(data); break;
    case 'ice': await handleIce(data); break;
  }
}

// ─── WebRTC ───────────────────────────────────────────────────────────────────
const ice={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

function createPC(pid){
  if(peerConnections[pid])return peerConnections[pid];
  const pc=new RTCPeerConnection(ice);
  peerConnections[pid]=pc;
  pc.onicecandidate=e=>{if(e.candidate)send({type:'ice',target:pid,candidate:e.candidate});};
  pc.ontrack=e=>{
    if(!audioCtx)audioCtx=new AudioContext();
    const audio=new Audio(); audio.srcObject=e.streams[0]; audio.play().catch(()=>{});
    const src=audioCtx.createMediaStreamSource(e.streams[0]);
    const g=audioCtx.createGain(); g.gain.value=1;
    src.connect(g); g.connect(audioCtx.destination);
    remoteGains[pid]=g;
  };
  return pc;
}
async function createOffer(pid){
  const pc=createPC(pid);
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const o=await pc.createOffer(); await pc.setLocalDescription(o);
  send({type:'offer',target:pid,sdp:o});
}
async function handleOffer(d){
  const pc=createPC(d.from);
  if(localStream)localStream.getTracks().forEach(t=>{if(!pc.getSenders().find(s=>s.track===t))pc.addTrack(t,localStream);});
  await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
  const a=await pc.createAnswer(); await pc.setLocalDescription(a);
  send({type:'answer',target:d.from,sdp:a});
}
async function handleAnswer(d){const pc=peerConnections[d.from];if(pc)await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));}
async function handleIce(d){const pc=peerConnections[d.from];if(pc&&d.candidate)try{await pc.addIceCandidate(new RTCIceCandidate(d.candidate));}catch{}}
function closePeer(id){if(peerConnections[id]){peerConnections[id].close();delete peerConnections[id];}delete remoteGains[id];}

// ─── Join / Leave ─────────────────────────────────────────────────────────────
async function toggleJoin(){
  if(connected){
    if(locationActive)toggleLocation();
    send({type:'leave'}); ws.close(); ws=null;
    Object.keys(peerConnections).forEach(closePeer);
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    if(audioCtx){audioCtx.close();audioCtx=null;analyserNode=null;}
    members={}; renderMembers(); stopMeter(); setConnected(false);
    addMsg('SISTEMA','DESCONECTADO','sys'); return;
  }
  myName=$('nameInput').value.trim().toUpperCase()||'USER_'+myId.slice(0,4).toUpperCase();
  roomId=$('roomInput').value.trim().toUpperCase()||'SQUAD1';
  const srv=$('serverInput').value.trim()||'ws://localhost:3000';
  $('nameInput').value=myName; $('roomInput').value=roomId;
  $('rLabel').textContent='[ '+roomId+' ]';
  setConnected(false,true);
  addMsg('SISTEMA','CONECTANDO A '+srv+'...','sys');
  try{ws=new WebSocket(srv);}catch{addMsg('SISTEMA','URL INVÁLIDA','sys');setConnected(false);return;}
  ws.onopen=async()=>{
    await initAudio();
    members[myId]={name:myName,speaking:false};
    renderMembers(); setConnected(true);
    send({type:'join',id:myId,name:myName,room:roomId});
    addMsg('SISTEMA',`CONECTADO A "${roomId}" COMO ${myName}`,'sys');
    if(map)$('mapNotice').style.display='none';
  };
  ws.onmessage=e=>{try{onMsg(JSON.parse(e.data));}catch{}};
  ws.onerror=()=>{addMsg('SISTEMA','ERROR — ¿SERVIDOR CORRIENDO?','sys');setConnected(false);};
  ws.onclose=()=>{if(connected){addMsg('SISTEMA','CONEXIÓN PERDIDA','sys');members={};renderMembers();setConnected(false);}};
}

function sendMsg(){
  const input=$('chatInput'), text=input.value.trim();
  if(!text||!connected)return;
  input.value=''; addMsg(myName,text); send({type:'chat',text});
}
